name: Build & Package Extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $VERSION"

      - name: Validate manifest
        run: |
          node -e "
            const m = require('./manifest.json');
            if (!m.manifest_version) throw new Error('Missing manifest_version');
            if (!m.name) throw new Error('Missing name');
            if (!m.version) throw new Error('Missing version');
            if (!m.description) throw new Error('Missing description');
            console.log('Manifest valid:', m.name, 'v' + m.version);
          "

      - name: Package extension (zip)
        run: |
          mkdir -p dist
          zip -r dist/claude-usage-ext-v${{ steps.version.outputs.version }}.zip \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.js \
            icons/ \
            _locales/ \
            -x "*.DS_Store" -x "*/__pycache__/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-ext-v${{ steps.version.outputs.version }}
          path: dist/*.zip
          retention-days: 30

  release:
    # Only run on version tags (e.g. v2.1.0)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build zip for release
        run: |
          mkdir -p dist
          zip -r dist/claude-usage-ext-v${{ steps.version.outputs.version }}.zip \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.js \
            icons/ \
            _locales/ \
            -x "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Claude Usage Tracker v${{ steps.version.outputs.version }}

            ### Install
            1. Download `claude-usage-ext-v${{ steps.version.outputs.version }}.zip`
            2. Unzip it
            3. Go to `chrome://extensions/` → Enable Developer Mode → Load unpacked

            Or install from the Chrome Web Store (link in README).
          files: dist/*.zip
          draft: false
          prerelease: false
